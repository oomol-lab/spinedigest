name: CI

on:
  push:
    branches:
      - main
      - migration
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          cache: pnpm
          node-version: 22

      - run: pnpm install --frozen-lockfile
      - run: pnpm verify
      - run: pnpm test:run
      - run: pnpm build
      - run: pnpm smoke:pack-install
